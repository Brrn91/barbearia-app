<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia - Agendamentos</title>
    <!--Styles-->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="bg-gray-900 text-white min-h-screen">

    <header class="bg-gray-800 py-6 shadow-lg">
        <div class="container mx-auto px-4">
            <h1 class="text-3xl font-bold text-yellow-400">✂️ Barbearia</h1>
            <p class="text-gray-400 mt-1">Gerenciador de Agendamentos</p>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">

        <!-- Formulário de Agendamento -->
        <section class="bg-gray-800 rounded-lg p-6 mb-8">
            <h2 class="text-xl font-semibold text-yellow-400 mb-4">Novo Agendamento</h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-400 mb-1">Cliente</label>
                    <select id="clienteId" class="w-full bg-gray-700 text-white rounded px-3 py-2">
                        <option value="">Selecione um cliente</option>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-400 mb-1">Barbeiro</label>
                    <select id="barbeiroId" class="w-full bg-gray-700 text-white rounded px-3 py-2">
                        <option value="">Selecione um barbeiro</option>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-400 mb-1">Data</label>
                    <input type="date" id="data" class="w-full bg-gray-700 text-white rounded px-3 py-2">
                </div>

                <div>
                    <label class="block text-gray-400 mb-1">Horário</label>
                    <input type="time" id="horario" class="w-full bg-gray-700 text-white rounded px-3 py-2">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-gray-400 mb-1">Serviço</label>
                    <select id="servico" class="w-full bg-gray-700 text-white rounded px-3 py-2">
                        <option value="">Selecione um serviço</option>
                        <option value="Corte">Corte</option>
                        <option value="Barba">Barba</option>
                        <option value="Corte e Barba">Corte e Barba</option>
                        <option value="Degradê">Degradê</option>
                    </select>
                </div>
            </div>

            <button id="btnAgendar"
                class="mt-4 bg-yellow-400 text-gray-900 font-bold px-6 py-2 rounded hover:bg-yellow-300 transition">
                Agendar
            </button>

            <p id="mensagem" class="mt-3 text-sm"></p>
        </section>

        <!-- Lista de Agendamentos -->
        <section class="bg-gray-800 rounded-lg p-6">
            <h2 class="text-xl font-semibold text-yellow-400 mb-4">Agendamentos</h2>
            <div id="listaAgendamentos">
                <p class="text-gray-400">Carregando agendamentos...</p>
            </div>
        </section>

    </main>
    <!--Script-->
    <script src="./js/app.js"></script>
</body>

</html>
